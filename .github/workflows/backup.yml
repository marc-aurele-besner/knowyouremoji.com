name: Database Backup

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  backup:
    name: Backup Neon Database
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install pg_dump
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run scripts/backup-neon.ts

      - name: Find backup file
        id: backup
        run: |
          BACKUP_FILE=$(ls -t backups/*.sql | head -1)
          echo "file=$BACKUP_FILE" >> $GITHUB_OUTPUT
          echo "filename=$(basename $BACKUP_FILE)" >> $GITHUB_OUTPUT

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-backup-${{ steps.backup.outputs.filename }}
          path: ${{ steps.backup.outputs.file }}
          retention-days: 7
          compression-level: 9

      - name: Delete old backups (keep last 7 days)
        run: |
          # Keep only the most recent backup per day
          cd backups
          ls -t *.sql | tail -n +8 | xargs -r rm -f

  # Note: For long-term backup storage, consider:
  # 1. Uploading to AWS S3 or Google Cloud Storage
  # 2. Using GitHub Releases for versioned backups
  # 3. Configuring Neon PITR (Point-in-Time Recovery) for automatic recovery
  #
  # Neon PITR provides:
  # - Automatic continuous backup
  # - 1 second point-in-time recovery granularity
  # - Recovery to any point within the retention period
  #
  # Configure PITR in Neon Dashboard → Settings → Backup